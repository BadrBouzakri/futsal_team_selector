<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur serveur - Futsal Team Selector</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to right, #ff4e50, #f9d423);
            color: white;
            text-align: center;
        }
        
        .container {
            max-width: 600px;
            padding: 40px;
            background-color: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        h1 {
            font-size: 42px;
            margin-bottom: 20px;
        }
        
        p {
            font-size: 18px;
            margin-bottom: 30px;
        }
        
        .btn {
            display: inline-block;
            background-color: #28a745;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
            transition: background-color 0.3s, transform 0.2s;
        }
        
        .btn:hover {
            background-color: #218838;
            transform: scale(1.05);
        }
        
        .error-code {
            font-size: 120px;
            font-weight: bold;
            margin: 0;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
        }
        
        .whistle {
            width: 120px;
            height: 120px;
            margin: 30px auto;
            position: relative;
        }
        
        .whistle::before {
            content: "";
            width: 60px;
            height: 60px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 30px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        
        .whistle::after {
            content: "";
            width: 100px;
            height: 30px;
            background: #ddd;
            position: absolute;
            top: 45px;
            left: 10px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            transform: rotate(-15deg);
        }
        
        @keyframes shake {
            0%, 100% {
                transform: rotate(0);
            }
            25% {
                transform: rotate(-5deg);
            }
            75% {
                transform: rotate(5deg);
            }
        }
        
        .whistle {
            animation: shake 0.5s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="whistle"></div>
        <h1 class="error-code">500</h1>
        <h2>Erreur Serveur</h2>
        <p>Désolé, une erreur s'est produite sur le serveur.</p>
        <p>Comme un arbitre qui a sifflé une faute, nous avons détecté un problème et nos équipes techniques travaillent à le résoudre.</p>
        <a href="{{ url_for('main.index') }}" class="btn">Retour à l'accueil</a>
    </div>
</body>
</html>
